name: Variable-env and screate level 
on:
  push:
    paths:
      - 'src/**'
      - 'my_test.txt'

env:
  MESSAGE: "Hello DevOps"
  ENV_NAME: "Production"

jobs:
  branch:
    name: Testing Branch
    runs-on: ubuntu-latest

    steps:
      - name: Print Variables
        run: |
         echo "Hello, My Name is ${{My_Name}}"
          echo "Message is $MESSAGE"
          echo "Environment is $ENV_NAME"
